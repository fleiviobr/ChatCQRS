<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat CQRS - Kafka</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="sidebar">
        <h3>Configuração</h3>
        <input type="text" id="username" placeholder="Seu apelido..." value="">
        <input type="text" id="room" placeholder="Nome da sala..." value="">
        <button onclick="conectar()">Conectar na Sala</button>
        <div id="status" style="color: #ed4245; font-size: 0.9em; margin-top: 10px;">Desconectado</div>
    </div>

    <div id="chat-container">
        <div id="header">Sala: <span id="room-name">Nenhuma</span></div>

        <div id="messages">
        </div>

        <div id="input-area">
            <form id="chat-form" onsubmit="enviarMensagem(event)">
                <input type="text" id="message-input" placeholder="Digite sua mensagem aqui..." disabled>
                <button type="submit" id="send-btn" disabled>Enviar</button>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
